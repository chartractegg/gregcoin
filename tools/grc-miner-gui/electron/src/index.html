<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gregcoin Miner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:0}
  header{background:#0f3460;padding:16px 20px;display:flex;align-items:center;gap:10px}
  header h1{font-size:1.3rem;color:#00c853;letter-spacing:1px}
  header span{font-size:1.6rem}
  .card{background:#16213e;border-radius:8px;padding:16px;margin:12px}
  .card h2{font-size:.8rem;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:12px;border-bottom:1px solid #0f3460;padding-bottom:6px}
  .form-row{display:grid;grid-template-columns:110px 1fr;align-items:center;gap:6px;margin-bottom:8px}
  .form-row label{font-size:.85rem;color:#aaa;text-align:right;padding-right:8px}
  input{background:#1a1a2e;border:1px solid #0f3460;border-radius:4px;color:#e0e0e0;padding:6px 8px;font-size:.9rem;width:100%}
  input:focus{outline:none;border-color:#00c853}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:#0f3460;border-radius:6px;padding:12px;text-align:center}
  .stat .val{font-size:1.4rem;font-weight:bold;color:#00c853;font-family:'Courier New',monospace}
  .stat .lbl{font-size:.75rem;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .status-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0}
  .dot.active{background:#00c853;box-shadow:0 0 6px #00c853}
  #status-text{font-size:.9rem;color:#aaa}
  .btn-row{display:flex;gap:10px;padding:0 12px 12px}
  button{flex:1;padding:12px;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer;transition:opacity .15s}
  #btn-start{background:#00c853;color:#000}
  #btn-stop{background:#b71c1c;color:#fff}
  button:disabled{opacity:.4;cursor:default}
  #log{background:#111827;border-radius:4px;font-family:'Courier New',monospace;font-size:.8rem;height:130px;overflow-y:auto;padding:8px;color:#4ade80}
  .log-line{margin-bottom:2px;word-break:break-all}
  .log-err{color:#f87171}
  .progress{height:4px;background:#0f3460;border-radius:2px;overflow:hidden;margin-top:10px}
  .progress-bar{height:100%;background:#00c853;width:0%;transition:width .3s;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>

<header>
  <span>⛏</span>
  <h1>GREGCOIN MINER</h1>
  <span style="margin-left:auto;font-size:.75rem;color:#555">v0.1.0</span>
</header>

<div class="card">
  <h2>Node Connection</h2>
  <div class="form-row"><label>Host</label><input id="i-host" value="127.0.0.1"/></div>
  <div class="form-row"><label>RPC Port</label><input id="i-port" value="8445" type="number"/></div>
  <div class="form-row"><label>User</label><input id="i-user" value="grcuser"/></div>
  <div class="form-row"><label>Password</label><input id="i-pass" type="password"/></div>
  <div class="form-row"><label>Address</label><input id="i-addr" placeholder="Leave blank to auto-generate"/></div>
</div>

<div class="card">
  <h2>Stats</h2>
  <div class="stats-grid">
    <div class="stat"><div class="val" id="s-rate">0 H/s</div><div class="lbl">Hash Rate</div></div>
    <div class="stat"><div class="val" id="s-blocks">0</div><div class="lbl">Blocks Found</div></div>
    <div class="stat"><div class="val" id="s-bal">0.0000</div><div class="lbl">Balance (GRC)</div></div>
    <div class="stat"><div class="val" id="s-height">—</div><div class="lbl">Chain Height</div></div>
  </div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Stopped</span>
  </div>
  <div class="progress"><div class="progress-bar" id="prog-bar" style="display:none"/></div>
</div>

<div class="card">
  <h2>Log</h2>
  <div id="log"></div>
</div>

<div class="btn-row">
  <button id="btn-start">▶  Start Mining</button>
  <button id="btn-stop" disabled>◼  Stop</button>
</div>

<script src="renderer.js"></script>
</body>
</html>
