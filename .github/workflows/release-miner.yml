name: Release Miner

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows Miner (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Fyne dependencies
        run: go mod tidy
        working-directory: tools/grc-miner-gui/go-fyne

      - name: Build Windows exe
        working-directory: tools/grc-miner-gui/go-fyne
        run: go build -ldflags="-H windowsgui" -o Gregminer.exe .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/grc-miner-gui/go-fyne/Gregminer.exe
          generate_release_notes: true
